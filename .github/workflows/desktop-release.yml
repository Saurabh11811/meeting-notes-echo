name: Desktop installers

on:
  workflow_dispatch:
    inputs:
      package_asr:
        description: "Bundle ASR libraries into the backend sidecar"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            script: desktop:dist:mac
          - os: windows-2022
            script: desktop:dist:win
          - os: ubuntu-22.04
            script: desktop:dist:linux

    env:
      ECHO_PACKAGE_ASR: ${{ github.event.inputs.package_asr == 'true' && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${ECHO_PACKAGE_ASR}" = "1" ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install -r requirements-desktop-lite.txt
          fi
          python -m pip install -r requirements-packaging.txt

      - name: Install desktop dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Build installer
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ matrix.os }}-installers
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
